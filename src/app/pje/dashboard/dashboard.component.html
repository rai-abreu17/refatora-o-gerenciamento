<app-page-header
  [title]="'Dashboard PJe'"
  [breadcrumbs]="[{label: 'PJe'}, {label: 'Dashboard'}]">
</app-page-header>

<div class="dashboard">
  <app-dashboard-filters
    [filters]="filters()"
    (filtersChange)="onFiltersChange($event)">
  </app-dashboard-filters>

  @if (snapshot(); as snap) {
    <section class="kpi-grid" aria-label="Indicadores-chave">
      @for (k of snap.kpis; track k.id) {
        <app-kpi-stat-card
          [title]="k.title"
          [value]="k.value"
          [deltaPct]="k.deltaPct"
          [sparkline]="k.sparkline"
          [tone]="k.tone"
          [hint]="k.hint ?? ''">
        </app-kpi-stat-card>
      }
    </section>

    <app-trend-chart
      [series1G]="snap.series1G"
      [series2G]="snap.series2G"
      [granularity]="filters().granularity"
      (granularityChange)="onGranularityChange($event)">
    </app-trend-chart>

    <div class="analytic-grid">
      <div class="analytic-grid__cell analytic-grid__cell--wide">
        <app-login-heatmap [cells]="snap.heatmap"></app-login-heatmap>
      </div>
      <div class="analytic-grid__cell">
        <app-distribution-chart
          [title]="'Vínculo cadastral'"
          [subtitle]="'Ativo · Inativo · Sem vínculo'"
          [variant]="'donut'"
          [slices]="snap.vinculoDistribution">
        </app-distribution-chart>
      </div>
      <div class="analytic-grid__cell">
        <app-distribution-chart
          [title]="'Origem do usuário'"
          [subtitle]="'Interno × Externo'"
          [variant]="'hbar'"
          [slices]="snap.origemDistribution">
        </app-distribution-chart>
      </div>
      <div class="analytic-grid__cell">
        <app-distribution-chart
          [title]="'Comparativo TRE-MA × TSE'"
          [subtitle]="'Usuários por órgão e sistema'"
          [variant]="'grouped-bar'"
          [categories]="orgaoSistemaCategories()"
          [series]="orgaoSistemaSeries(snap)">
        </app-distribution-chart>
      </div>
      <div class="analytic-grid__cell analytic-grid__cell--wide">
        <app-last-access-buckets [buckets]="snap.lastAccessBuckets"></app-last-access-buckets>
      </div>
    </div>

    <app-critical-users-table [users]="snap.criticos"></app-critical-users-table>

    <app-compliance-footer [metrics]="snap.compliance"></app-compliance-footer>
  } @else {
    <div class="dashboard__loading" role="status" aria-live="polite">
      <span>Carregando dashboard...</span>
    </div>
  }
</div>
