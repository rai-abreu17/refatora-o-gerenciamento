<section class="dist-card" [attr.aria-labelledby]="'dist-title-' + title()">
  <header class="dist-card__head" style="display: flex; justify-content: space-between; align-items: flex-start;">
    <div>
      <h3 class="dist-card__title" [id]="'dist-title-' + title()">
        {{ title() }}
        @if (infoText()) {
          <app-info-tooltip [text]="infoText()"></app-info-tooltip>
        }
      </h3>
      @if (subtitle()) {
        <p class="dist-card__subtitle">{{ subtitle() }}</p>
      }
    </div>
    @if (clickable()) {
      <span class="click-hint" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Mais detalhes
      </span>
    }
  </header>
  <div class="dist-card__chart"
       [class.dist-card__chart--donut]="variant() === 'donut'">
    <canvas baseChart
      [data]="chartData()"
      [options]="chartOptions()"
      [type]="chartType()">
    </canvas>
    @if (variant() === 'donut' && total()) {
      <div class="dist-card__total" aria-hidden="true">
        <span class="dist-card__total-value">{{ total().toLocaleString('pt-BR') }}</span>
        <span class="dist-card__total-label">total</span>
      </div>
    }
  </div>
</section>
