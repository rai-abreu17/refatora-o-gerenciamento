<aside class="sidebar" [class.open]="isOpen()">
  <div class="sidebar-header">
    <button class="btn-close-sidebar" (click)="closeSidebar.emit()" aria-label="Fechar menu">
      <!-- Novo ícone de fechar -->
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="M9 3v18"></path><path d="m16 15-3-3 3-3"></path></svg>
    </button>
  </div>

<!-- Botão de abrir sidebar fixo na lateral quando fechado -->
<ng-container *ngIf="!isOpen()">
  <button class="btn-open-sidebar" (click)="openSidebar.emit()" aria-label="Abrir menu lateral">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="M9 3v18"></path></svg>
  </button>
</ng-container>

  <nav class="sidebar-nav">
    @for (section of sections; track section.key) {
      <div class="nav-section">
        <button
          class="nav-section-header"
          (click)="toggleSection(section.key)"
          [attr.aria-expanded]="isSectionExpanded(section.key)">
          <span class="section-label">{{ section.label }}</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            fill="currentColor"
            viewBox="0 0 16 16"
            class="chevron"
            [class.rotated]="isSectionExpanded(section.key)">
            <path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708"/>
          </svg>
        </button>

        @if (isSectionExpanded(section.key)) {
          <div class="nav-items">
            @for (item of section.items; track item.route) {
              <a
                class="nav-item"
                [routerLink]="item.route"
                routerLinkActive="active"
                (click)="onNavClick()">
                {{ item.label }}
              </a>
            }
          </div>
        }
      </div>
    }
  </nav>

  <div class="sidebar-footer">
    <small>TRE-MA &copy; 2026</small>
  </div>
</aside>

@if (isOpen()) {
  <div class="sidebar-backdrop d-md-none" (click)="closeSidebar.emit()"></div>
}
