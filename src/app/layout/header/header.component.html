<header class="app-header" role="banner">
  <!-- Bloco esquerdo: logo + nome do sistema + versão + toggle da sidebar -->
  <div class="header-brand">
    <span class="brand-logo" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
        <path d="M5.338 1.59a61 61 0 0 0-2.837.856.48.48 0 0 0-.328.39c-.554 4.157.726 7.19 2.253 9.188a10.7 10.7 0 0 0 2.287 2.233c.346.244.652.42.893.533q.18.085.293.118a1 1 0 0 0 .101.025 1 1 0 0 0 .1-.025q.114-.034.294-.118c.24-.113.547-.29.893-.533a10.7 10.7 0 0 0 2.287-2.233c1.527-1.997 2.807-5.031 2.253-9.188a.48.48 0 0 0-.328-.39c-.651-.213-1.75-.56-2.837-.855C9.552 1.29 8.531 1.067 8 1.067c-.53 0-1.552.223-2.662.524zM5.072.56C6.157.265 7.31 0 8 0s1.843.265 2.928.56c1.11.3 2.229.655 2.887.87a1.54 1.54 0 0 1 1.044 1.262c.596 4.477-.787 7.795-2.465 9.99a11.8 11.8 0 0 1-2.517 2.453 7 7 0 0 1-1.048.625c-.28.132-.581.24-.829.24s-.548-.108-.829-.24a7 7 0 0 1-1.048-.625 11.8 11.8 0 0 1-2.517-2.453C1.928 10.487.545 7.169 1.141 2.692A1.54 1.54 0 0 1 2.185 1.43 63 63 0 0 1 5.072.56"/>
      </svg>
    </span>
    <div class="brand-text">
      <span class="brand-name">{{ systemName() }}</span>
      <span class="brand-version">V. {{ version() }}</span>
    </div>
    <button
      type="button"
      class="btn-toggle-sidebar"
      (click)="onToggleSidebar()"
      [attr.aria-label]="sidebarOpen() ? 'Fechar menu lateral' : 'Abrir menu lateral'"
      [attr.aria-expanded]="sidebarOpen()"
      [title]="sidebarOpen() ? 'Fechar menu' : 'Abrir menu'">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
        <path d="M9 3v18"></path>
        @if (sidebarOpen()) {
          <path d="m16 15-3-3 3-3"></path>
        } @else {
          <path d="m14 9 3 3-3 3"></path>
        }
      </svg>
    </button>
  </div>

  <!-- Bloco direito: avatar + nome + sessão + logout -->
  <div class="header-user">
    <div class="user-avatar" aria-hidden="true">
      @if (userAvatarUrl(); as avatar) {
        <img [src]="avatar" [alt]="userName()" />
      } @else {
        <span class="avatar-initials">{{ userInitials() }}</span>
      }
    </div>

    <div class="user-info">
      <span class="user-name">{{ userName() }}</span>
      <span class="user-session font-mono" aria-label="Tempo de sessão">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
          <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71z"/>
          <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0"/>
        </svg>
        {{ sessionTime() }}
      </span>
    </div>

    <button
      type="button"
      class="btn-logout"
      (click)="onLogout()"
      aria-label="Sair"
      title="Sair">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
        <path fill-rule="evenodd" d="M6 12.5a.5.5 0 0 0 .5.5h8a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-8a.5.5 0 0 0-.5.5v2a.5.5 0 0 1-1 0v-2A1.5 1.5 0 0 1 6.5 2h8A1.5 1.5 0 0 1 16 3.5v9a1.5 1.5 0 0 1-1.5 1.5h-8A1.5 1.5 0 0 1 5 12.5v-2a.5.5 0 0 1 1 0z"/>
        <path fill-rule="evenodd" d="M.146 8.354a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L1.707 7.5H10.5a.5.5 0 0 1 0 1H1.707l2.147 2.146a.5.5 0 0 1-.708.708z"/>
      </svg>
    </button>
  </div>
</header>
