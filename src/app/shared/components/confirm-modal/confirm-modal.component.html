<div class="modal-backdrop-custom" (click)="onCancel()"></div>
<div class="modal d-block" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ title() }}</h5>
        <button type="button" class="btn-close" (click)="onCancel()" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        <p>{{ message() }}</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" (click)="onCancel()">{{ cancelLabel() }}</button>
        <button
          type="button"
          class="btn btn-primary btn-sm"
          (click)="onConfirm()"
          [disabled]="processing()">
          @if (processing()) {
            <span class="spinner-border spinner-border-sm me-1" role="status"></span>
          }
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
</div>
