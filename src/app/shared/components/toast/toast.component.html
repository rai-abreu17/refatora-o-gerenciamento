<div class="toast-container">
  @for (toast of toasts$ | async; track toast.id) {
    <div class="toast-item" [ngClass]="getClass(toast.type)">
      <span class="toast-message">{{ toast.message }}</span>
      <button class="toast-close" (click)="remove(toast.id)" aria-label="Fechar">&times;</button>
    </div>
  }
</div>
